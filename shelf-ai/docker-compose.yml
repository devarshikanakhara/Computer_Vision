version: "3.9"

services:
  backend:
    build: ./backend
    container_name: shelfai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    # Uncomment if you have an NVIDIA GPU + nvidia-container-toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build: ./frontend
    container_name: shelfai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
  outputs:
